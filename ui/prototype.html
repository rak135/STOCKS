const Chip = ({ tone="neutral", children, className="" }) => {
  const tones = {
    neutral: "bg-borderc/60 text-ink2",
    info:    "bg-accentBg  text-accent",
    ok:      "bg-okBg      text-ok",
    warn:    "bg-warnBg    text-warn",
    err:     "bg-errBg     text-err",
    filed:   "bg-filedBg   text-filed",
  };
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-medium ${tones[tone]} ${className}`}>{children}</span>;
};

const Button = ({ variant="primary", className="", children, ...rest }) => {
  const base = "inline-flex items-center gap-2 px-3.5 py-2 rounded-lg text-sm font-medium focus-ring transition-colors disabled:opacity-40 disabled:cursor-not-allowed";
  const v = {
    primary:   "bg-accent text-white hover:bg-[#B3573A]",
    secondary: "bg-white border border-borderc text-ink hover:bg-bg",
    ghost:     "text-ink2 hover:text-ink hover:bg-borderc/40",
    danger:    "bg-white border border-errBg text-err hover:bg-errBg",
  }[variant];
  return <button className={`${base} ${v} ${className}`} {...rest}>{children}</button>;
};

          <div className="leading-tight">
            <div className="text-[13px] font-semibold">Stocks Tax</div>
            <div className="text-[11px] text-ink3">Operator cockpit</div>
          </div>
        </div>
      </div>
      <nav className="px-2 py-2 flex-1">
        {NAV.map(n => {
          const isActive = active===n.id;
          return (
            <button key={n.id} onClick={()=>onGo(n.id)}
              className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-[13px] focus-ring ${
                isActive
                  ? "bg-accentBg text-ink font-medium"
                  : "text-ink2 hover:bg-borderc/40 hover:text-ink"
              }`}>
              <Icon name={n.icon} className="w-4 h-4" />
              {n.label}
            </button>
          );

      <div className="px-4 py-3 border-t border-borderc text-[11px] text-ink3 space-y-0.5">

/* ──────────────────────────────────────────────────────────────
   SALES REVIEW
   ────────────────────────────────────────────────────────────── */
function SalesScreen() {
  const [sells, setSells] = useState(SELLS);
  const [selectedId, setSelectedId] = useState(SELLS[0].id);
  const [filter, setFilter] = useState({ year:"all", status:"all", q:"" });

  const filtered = sells.filter(s => {
    if (filter.year!=="all" && s.year!==Number(filter.year)) return false;
    if (filter.status!=="all" && s.review!==filter.status) return false;
    if (filter.q && !s.ticker.toLowerCase().includes(filter.q.toLowerCase())) return false;
    return true;
  });

  const selected = sells.find(s=>s.id===selectedId) || filtered[0];
  useEffect(()=>{
    if (selected && !filtered.find(s=>s.id===selected.id) && filtered[0]) setSelectedId(filtered[0].id);
  }, [filter]); // eslint-disable-line

  const patchSell = (id, p) => setSells(xs => xs.map(s=>s.id===id?{...s,...p}:s));

  return (
    <div className="h-full flex">
      {/* LEFT pane */}
      <div className="w-[340px] border-r border-borderc bg-surface flex flex-col">
        <div className="px-4 pt-5 pb-3">
          <div className="text-[11px] uppercase tracking-wider text-ink3 mb-1">Sales Review</div>
          <div className="text-[17px] font-semibold tracking-tight">Sells — {filtered.length}</div>
        </div>
        <div className="px-4 pb-3 space-y-2">
          <div className="relative">
            <Icon name="search" className="w-4 h-4 absolute left-2 top-2.5 text-ink3"/>
            <input placeholder="Ticker…" value={filter.q}
                   onChange={e=>setFilter(f=>({...f,q:e.target.value}))}
                   className="w-full border border-borderc rounded-md pl-7 pr-2 py-2 text-sm bg-bg focus-ring"/>
          </div>
          <div className="flex gap-1 flex-wrap">
            {["all",2025,2024,2023].map(y=>(
              <button key={y} onClick={()=>setFilter(f=>({...f,year:String(y)}))}
                className={`px-2 py-0.5 rounded-full text-[11px] ${filter.year===String(y)?"bg-accentBg text-accent":"bg-borderc/50 text-ink2"}`}>
                {y==="all"?"All years":y}
              </button>
            ))}
          </div>
          <div className="flex gap-1">
            {[["all","All"],["unreviewed","Unreviewed"],["reviewed","Reviewed"],["flagged","Flagged"]].map(([k,v])=>(
              <button key={k} onClick={()=>setFilter(f=>({...f,status:k}))}
                className={`px-2 py-0.5 rounded-full text-[11px] ${filter.status===k?"bg-accentBg text-accent":"bg-borderc/50 text-ink2"}`}>
                {v}
              </button>
            ))}
          </div>
        </div>
        <ul className="flex-1 overflow-auto divide-y divide-borderc">
          {filtered.map(s=>(
            <li key={s.id}>
              <button onClick={()=>setSelectedId(s.id)}
                className={`w-full text-left px-4 py-3 hover:bg-bg focus-ring ${selected?.id===s.id?"bg-accentBg/60":""}`}>
                <div className="flex items-center gap-2">
                  <ReviewDot status={s.review}/>
                  <span className="text-sm font-medium">{s.ticker}</span>
                  <span className="text-[11px] text-ink3 ml-auto">{s.date}</span>
                </div>
                <div className="flex items-center justify-between mt-0.5">
                  <span className="text-[12px] text-ink2">{s.qty} sh · {s.broker}</span>
                  <span className="text-[12px] num">{czk(s.proceedsCzk)}</span>
                </div>
              </button>
            </li>
          ))}
        </ul>
      </div>

      {/* RIGHT pane */}
      <div className="flex-1 overflow-auto">
        {selected && <SellDetail sell={selected} onPatch={p=>patchSell(selected.id,p)}/>}
      </div>
    </div>
  );
}

function ReviewDot({ status }) {
  const color = { reviewed:"bg-ok", unreviewed:"bg-ink3", flagged:"bg-warn" }[status];
  return <span className={`inline-block w-2 h-2 rounded-full ${color}`}/>;
}

      </Card>

      {/* Matched lots */}
      <div>
        <div className="flex items-center gap-2 mb-2">
          <h2 className="text-sm font-semibold text-ink2">Matched buy lots ({sell.lots.length})</h2>

        <div className="space-y-3">
          {sell.lots.map(l => <BuyLotCard key={l.lot} l={l}/>)}

          defaultValue=""

          className="w-full border border-borderc rounded-md px-3 py-2 text-sm bg-surface focus-ring resize-none"/>
      </Card>

      <div className="flex items-center justify-end gap-2">
        <Button variant="ghost"><Icon name="download"/>Export this sell</Button>
      </div>

      <div className="grid grid-cols-4 gap-3 text-sm mt-2 pt-3 border-t border-borderc">
        <KeyVal label="Cost basis">{czk(l.costCzk)}</KeyVal>
        <KeyVal label="Proceeds">{czk(l.proceedsCzk)}</KeyVal>
        <KeyVal label="Net (CZK)">{czk(l.proceedsCzk - l.costCzk)}</KeyVal>
        <div className="flex items-end justify-end">
          <button className="text-[12px] text-accent hover:underline focus-ring">Open raw CSV row <Icon name="external" className="w-3 h-3 inline"/></button>
        </div>
      </div>
    </Card>
  );
}

/* ──────────────────────────────────────────────────────────────
   OPEN POSITIONS
   ────────────────────────────────────────────────────────────── */
function PositionsScreen() {
  const [expanded, setExpanded] = useState(null);
  return (
    <div className="max-w-5xl mx-auto px-8 py-8">
      <SectionHeader
        title="Open Positions"
        subtitle="Does the residual inventory match what you actually hold?"
      />
      <div className="space-y-3">
        {OPEN_POSITIONS.map(p=>(
          <Card key={p.ticker}>
            <button onClick={()=>setExpanded(expanded===p.ticker?null:p.ticker)}
                    className="w-full flex items-center gap-5 px-5 py-4 text-left focus-ring">
              <div className="w-24">
                <div className="font-semibold">{p.ticker}</div>
                <div className="text-[11px] text-ink3">{p.lots.length} open lot{p.lots.length>1?"s":""}</div>
              </div>
              <div className="flex-1 grid grid-cols-4 gap-3">
                <KeyVal label="Calculated">{p.calc}</KeyVal>
                <KeyVal label="Yahoo">{p.yahoo==null?"—":p.yahoo}</KeyVal>
                <KeyVal label="Difference">{p.diff==null?"—":(p.diff>0?`+${p.diff}`:p.diff)}</KeyVal>
                <div className="flex items-center">
                  {p.status==="ok"      && <Chip tone="ok"><Icon name="check" className="w-3 h-3"/>OK</Chip>}
                  {p.status==="warn"    && <Chip tone="warn">WARN</Chip>}
                  {p.status==="error"   && <Chip tone="err">ERROR</Chip>}
                  {p.status==="unknown" && <Chip tone="filed">UNKNOWN</Chip>}
                </div>
              </div>
              <Icon name={expanded===p.ticker?"chev":"chevR"} className="w-4 h-4 text-ink3"/>
            </button>
            {expanded===p.ticker && (
              <div className="border-t border-borderc px-5 py-4 bg-bg/60">
                {p.status==="unknown" && (
                  <div className="mb-3 text-[12px] text-filed italic">
                    Yahoo did not export a current position for {p.ticker}. Verify this residual with your broker directly.
                  </div>
                )}
                <table className="w-full text-sm">
                  <thead className="text-[11px] uppercase text-ink3 tracking-wider">
                    <tr className="text-left border-b border-borderc">
                      <th className="py-2 font-normal">Lot</th>
                      <th className="py-2 font-normal">Buy date</th>
                      <th className="py-2 font-normal">Broker</th>
                      <th className="py-2 font-normal text-right">Qty</th>
                      <th className="py-2 font-normal text-right">Cost (CZK)</th>
                      <th className="py-2 font-normal text-right">Paper P/L</th>
                    </tr>
                  </thead>
                  <tbody>
                    {p.lots.map(l=>(
                      <tr key={l.lot} className="border-b border-borderc/60">
                        <td className="py-2 font-mono text-xs">{l.lot}</td>
                        <td className="py-2">{l.date}</td>
                        <td className="py-2">{l.broker}</td>
                        <td className="py-2 text-right num">{l.qty}</td>
                        <td className="py-2 text-right num">{czk(l.costCzk)}</td>
                        <td className="py-2 text-right num">
                          {l.paperCzk==null
                            ? <span className="text-ink3">—</span>
                            : <span className={l.paperCzk>=0?"text-ok":"text-err"}>{czk(l.paperCzk)}</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────
   FX RATES
   ────────────────────────────────────────────────────────────── */
function FxScreen() {
  const [showMissing, setShowMissing] = useState(false);
  const visible = showMissing ? FX.filter(f=>f.missing.length>0) : FX;
  return (
    <div className="max-w-5xl mx-auto px-8 py-8">
      <SectionHeader
        title="FX Rates"
        subtitle="Every rate used must be defensibly sourced from CNB or GFŘ."
        primary={<Button><Icon name="download"/>Fetch all missing</Button>}
        secondary={
          <label className="flex items-center gap-2 text-sm text-ink2">
            <input type="checkbox" checked={showMissing} onChange={e=>setShowMissing(e.target.checked)}/>
            Missing only
          </label>
        }
      />

      <div className="space-y-4">
        {visible.map(f=>(
          <Card key={f.year} className={f.locked?"bg-filedBg/30":""}>
            <div className="flex items-center gap-4 px-5 py-4 border-b border-borderc">
              <div className="text-[20px] font-semibold tracking-tight w-20">{f.year}</div>
              <Chip tone="neutral">{f.method==="FX_DAILY_CNB"?"CNB daily":"GFŘ yearly"}</Chip>
              {f.locked && <Chip tone="filed"><Icon name="lock" className="w-3 h-3"/>Locked</Chip>}
              {f.missing.length>0 && <Chip tone="warn">{f.missing.length} rates missing</Chip>}
              {f.verifiedAt && <Chip tone="ok"><Icon name="check" className="w-3 h-3"/>Verified {f.verifiedAt.slice(0,10)}</Chip>}
              <div className="flex-1"/>
              {!f.locked && <Button variant="secondary"><Icon name="refresh"/>Fetch / verify</Button>}
            </div>
            <div className="px-5 py-4 grid grid-cols-4 gap-4">
              {f.method==="FX_UNIFIED_GFR"
                ? <>
                    <KeyVal label="Unified USD/CZK">{fxn(f.unified)}</KeyVal>
                    <KeyVal label="Source" mono={false}>{f.source}</KeyVal>
                    <KeyVal label="Verified" mono={false}>{f.verifiedAt || "—"}</KeyVal>
                    <KeyVal label="Manual override" mono={false}>{f.manual?"Yes":"No"}</KeyVal>
                  </>
                : <>
                    <KeyVal label="Daily rates cached">{f.dailyCached} / {f.dailyExpected}</KeyVal>
                    <KeyVal label="Missing">{f.missing.length}</KeyVal>
                    <KeyVal label="Source" mono={false}>{f.source}</KeyVal>
                    <KeyVal label="Last fetched" mono={false}>2026-04-24 17:45</KeyVal>
                  </>}
            </div>
            {f.missing.length>0 && (
              <div className="px-5 pb-4 text-[12px] text-warn">
                Missing: {f.missing.join(", ")}
              </div>
            )}
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ──────────────────────────────────────────────────────────────
   AUDIT PACK
   ────────────────────────────────────────────────────────────── */
function AuditScreen() {
  return (
    <div className="max-w-5xl mx-auto px-8 py-8">
      <SectionHeader
        title="Audit Pack"
        subtitle="Everything a tax-office check would ask for, traceable end to end."
      />

      <Card className="p-5 mb-5">
        <div className="text-[11px] uppercase tracking-wider text-ink3 mb-2">Traceability</div>
        <TraceDiagram/>
      </Card>

      <Card className="mb-5">
        <div className="px-5 py-3 border-b border-borderc text-sm font-medium">Yearly summary</div>
        <table className="w-full text-sm">
          <thead className="text-[11px] uppercase text-ink3 tracking-wider">
            <tr className="text-left">
              <th className="px-5 py-2 font-normal">Year</th>
              <th className="px-5 py-2 font-normal">Method</th>
              <th className="px-5 py-2 font-normal">FX</th>
              <th className="px-5 py-2 font-normal text-right">Proceeds</th>
              <th className="px-5 py-2 font-normal text-right">Taxable base</th>
              <th className="px-5 py-2 font-normal text-right">Tax</th>
              <th className="px-5 py-2 font-normal">Status</th>
            </tr>
          </thead>
          <tbody>
            {YEARS.map(y=>(
              <tr key={y.year} className="border-t border-borderc/60">
                <td className="px-5 py-2 font-semibold">{y.year}</td>
                <td className="px-5 py-2">{y.method}</td>
                <td className="px-5 py-2">{y.fx==="FX_DAILY_CNB"?"CNB daily":"GFŘ yearly"}</td>
                <td className="px-5 py-2 text-right num">{czk(y.proceeds)}</td>
                <td className="px-5 py-2 text-right num">{czk(y.base)}</td>
                <td className="px-5 py-2 text-right num font-medium">{czk(y.tax)}</td>
                <td className="px-5 py-2">
                  {y.locked
                    ? <Chip tone="filed"><Icon name="lock" className="w-3 h-3"/>Locked</Chip>
                    : <Chip tone="neutral">Draft</Chip>}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </Card>

      <h2 className="text-sm font-semibold text-ink2 mb-3">Export</h2>
      <div className="grid grid-cols-2 gap-3 mb-6">
        <ExportRow title="Excel workbook"      desc="The canonical 29-sheet workbook, rebuilt from current data." icon="file"/>
        <ExportRow title="PDF audit report"    desc="Human-readable report: yearly summaries, FX sources, methods." icon="file"/>
        <ExportRow title="CSV lot matching"    desc="Flat ledger of every (sell, buy lot) pair with source refs." icon="download"/>
        <ExportRow title="ZIP evidence pack"   desc="Workbook + PDF + CSV + original CSVs + FX cache snapshot." icon="download"/>
      </div>

      <h2 className="text-sm font-semibold text-ink2 mb-3">Locked snapshots</h2>
      <Card>
        <ul className="divide-y divide-borderc">
          {YEARS.filter(y=>y.locked).map(y=>(
            <li key={y.year} className="flex items-center gap-4 px-5 py-3">
              <Icon name="lock" className="w-4 h-4 text-filed"/>
              <span className="font-semibold w-16">{y.year}</span>
              <span className="text-sm text-ink2">{y.method} · locked 2025-02-14</span>
              <span className="flex-1"/>
              <Button variant="ghost"><Icon name="download"/>Re-export snapshot</Button>
            </li>
          ))}
        </ul>
      </Card>
    </div>
  );
}

function TraceDiagram() {
  const steps = [
    { label:"Yearly summary", sub:"5 years" },
    { label:"Sell",            sub:`${SELLS.length} sells` },
    { label:"Buy lots",        sub:`${SELLS.reduce((a,s)=>a+s.lots.length,0)} matched` },
    { label:"Source CSV row",  sub:`${FILES.reduce((a,f)=>a+f.trades,0).toLocaleString()} rows` },
    { label:"FX source",       sub:"CNB / GFŘ" },
  ];
  return (
    <div className="flex items-center gap-2">
      {steps.map((s,i)=>(
        <React.Fragment key={i}>
          <div className="flex-1 text-center border border-borderc rounded-lg py-3 px-2 bg-surface">
            <div className="text-[12px] font-medium">{s.label}</div>
            <div className="text-[11px] text-ink3 mt-0.5">{s.sub}</div>
          </div>
          {i<steps.length-1 && <Icon name="chevR" className="w-4 h-4 text-ink3 shrink-0"/>}
        </React.Fragment>
      ))}
    </div>
  );
}

function ExportRow({ title, desc, icon }) {
  return (
    <Card className="p-4 flex items-center gap-3">
      <div className="w-9 h-9 rounded-md bg-accentBg text-accent grid place-items-center"><Icon name={icon} className="w-4 h-4"/></div>
      <div className="flex-1">
        <div className="text-sm font-medium">{title}</div>
        <div className="text-[12px] text-ink3">{desc}</div>
      </div>
      <Button variant="secondary"><Icon name="download"/>Export</Button>
    </Card>
  );
}

/* ──────────────────────────────────────────────────────────────
   SETTINGS
   ────────────────────────────────────────────────────────────── */
function SettingsScreen() {
  const [dirty, setDirty] = useState(false);
  return (
    <div className="max-w-3xl mx-auto px-8 py-8">
      <SectionHeader
        title="Settings"
        subtitle="Local app configuration. Saved to settings.json next to the workbook."
        primary={<Button disabled={!dirty}>Save changes</Button>}
      />
      <Fieldset title="Paths">
        <Field label="Project folder"><input defaultValue={PROJECT.path} onChange={()=>setDirty(true)} className={inp}/></Field>
        <Field label="CSV folder"><input defaultValue={PROJECT.csv_folder} onChange={()=>setDirty(true)} className={inp}/></Field>
        <Field label="Output workbook"><input defaultValue={PROJECT.output} onChange={()=>setDirty(true)} className={inp}/></Field>
        <Field label="Cache folder"><input defaultValue="C:\\DATA\\PROJECTS\\STOCKS\\cache" onChange={()=>setDirty(true)} className={inp}/></Field>
      </Fieldset>

      <Fieldset title="Calculation defaults">
        <Field label="Default tax rate"><input type="number" step="0.01" defaultValue={0.15} onChange={()=>setDirty(true)} className={inp+" num"}/></Field>
        <Field label="Default FX method">
          <select defaultValue="FX_UNIFIED_GFR" onChange={()=>setDirty(true)} className={inp}>
            <option value="FX_UNIFIED_GFR">GFŘ yearly</option>
            <option value="FX_DAILY_CNB">CNB daily</option>
          </select>
        </Field>
        <Field label="Default 100k exemption"><select defaultValue="off" onChange={()=>setDirty(true)} className={inp}><option>off</option><option>on</option></select></Field>
      </Fieldset>

      <Fieldset title="Tolerances">
        <Field label="Unmatched quantity tolerance (shares)"><input type="number" step="0.0001" defaultValue="0" onChange={()=>setDirty(true)} className={inp+" num"}/></Field>
        <Field label="Yahoo position reconciliation tolerance (shares)"><input type="number" step="0.0001" defaultValue="0" onChange={()=>setDirty(true)} className={inp+" num"}/></Field>
      </Fieldset>

      <Fieldset title="Backup & lock policy">
        <Field label="Backup workbook on every recalculate">
          <select defaultValue="yes" onChange={()=>setDirty(true)} className={inp}><option>yes</option><option>no</option></select>
        </Field>
        <Field label="Require confirmation to unlock a year">
          <select defaultValue="yes" onChange={()=>setDirty(true)} className={inp}><option>yes</option><option>no</option></select>
        </Field>
        <Field label="Keep N snapshots per year"><input type="number" defaultValue={5} onChange={()=>setDirty(true)} className={inp+" num"}/></Field>
      </Fieldset>

      <Fieldset title="Validation">
        <Field label="Excel validation">
          <select defaultValue="warn" onChange={()=>setDirty(true)} className={inp}><option>strict</option><option>warn</option><option>off</option></select>
        </Field>
      </Fieldset>
    </div>
  );
}
const inp = "w-full border border-borderc rounded-md px-2 py-1.5 text-sm bg-surface focus-ring";
function Fieldset({ title, children }) {
  return (
    <section className="mb-6">
      <h2 className="text-[11px] uppercase tracking-wider text-ink3 mb-2">{title}</h2>
      <Card className="p-5 space-y-4">{children}</Card>
    </section>
  );
}
function Field({ label, children }) {
  return (
    <label className="block">
      <div className="text-[12px] text-ink2 mb-1">{label}</div>
      {children}
    </label>
  );
}

/* ──────────────────────────────────────────────────────────────
   App shell
   ────────────────────────────────────────────────────────────── */
function App() {
  const [active, setActive] = useState("overview");
  const [status, setStatus] = useState("needs_review");
  const [toast, setToast] = useState(null);

  const handleRecalc = () => {
    setToast("Recalculating from .csv …");
    setTimeout(()=>{ setStatus("needs_review"); setToast("Recalculation complete — 2 unresolved checks."); }, 900);
    setTimeout(()=>setToast(null), 3200);
  };

  return (
    <div className="h-full flex bg-bg text-ink">
      <Sidebar active={active} onGo={setActive}/>
      <div className="flex-1 flex flex-col min-w-0">
        <TopBar status={status} onRecalc={handleRecalc} dirty={false}/>
        <main className="flex-1 min-h-0 overflow-auto">
          {active==="overview"  && <Overview go={setActive} status={status}/>}
          {active==="import"    && <ImportScreen/>}
          {active==="years"     && <YearsScreen/>}
          {active==="sales"     && <SalesScreen/>}
          {active==="positions" && <PositionsScreen/>}
          {active==="fx"        && <FxScreen/>}
          {active==="audit"     && <AuditScreen/>}
          {active==="settings"  && <SettingsScreen/>}
        </main>
      </div>

      {toast && (
        <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-surface border border-borderc shadow-soft rounded-lg px-4 py-2 text-sm flex items-center gap-2">
          <Icon name="refresh" className="w-4 h-4 text-accent"/>
          {toast}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
